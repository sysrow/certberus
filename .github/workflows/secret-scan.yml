name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 04:30 UTC - catches anything that bypassed pre-commit / PR checks.
    - cron: '30 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks (working tree + full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VER=8.30.1
          curl -fsSL -o /tmp/gl.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz"
          tar -xzf /tmp/gl.tgz -C /tmp
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Gitleaks - working tree
        run: gitleaks dir --no-banner --config .gitleaks.toml --redact=0 --exit-code 1 .

      - name: Gitleaks - full git history
        run: gitleaks git --no-banner --config .gitleaks.toml --redact=0 --exit-code 1 .

  trufflehog:
    name: TruffleHog (filesystem + git)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install trufflehog
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin v3.91.2
          trufflehog --version

      - name: TruffleHog - filesystem
        run: |
          set -euo pipefail
          out=$(trufflehog filesystem --no-update \
                  --exclude-paths .trufflehog-exclude.txt \
                  --json . 2>/dev/null \
                | jq -c 'select(.SourceMetadata.Data != null)')
          if [[ -n "$out" ]]; then
            echo "::error::trufflehog found secrets in filesystem"
            echo "$out" | jq .
            exit 1
          fi

      - name: TruffleHog - git history
        run: |
          set -euo pipefail
          out=$(trufflehog git --no-update \
                  --exclude-paths .trufflehog-exclude.txt \
                  --json "file://$PWD" 2>/dev/null \
                | jq -c 'select(.SourceMetadata.Data != null)')
          if [[ -n "$out" ]]; then
            echo "::error::trufflehog found secrets in git history"
            echo "$out" | jq .
            exit 1
          fi

  detect-secrets:
    name: detect-secrets vs baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Audit baseline
        # Re-scan and assert the baseline already accounts for every finding.
        # `detect-secrets audit --report --fail-on-unaudited --baseline` is the
        # right primitive but here we want "no NEW finding outside the baseline",
        # so we re-scan, diff against baseline, and fail on additions.
        run: |
          set -euo pipefail
          cp .secrets.baseline /tmp/baseline.before
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files '\.git/' \
            --exclude-files '\.gitleaks\.toml$' \
            --exclude-files '\.secrets\.baseline$'
          # Treat a non-trivial baseline diff as a new finding.
          # detect-secrets writes timestamps + version, so structural compare:
          before_files=$(jq -S '.results | keys' /tmp/baseline.before)
          after_files=$(jq -S '.results | keys' .secrets.baseline)
          if [[ "$before_files" != "$after_files" ]]; then
            echo "::error::detect-secrets - new files contain potential secrets"
            diff <(echo "$before_files") <(echo "$after_files") || true
            exit 1
          fi
          # Per-file: same set of hashed secrets?
          for f in $(echo "$before_files" | jq -r '.[]'); do
            before_set=$(jq -S --arg f "$f" '.results[$f] | map(.hashed_secret) | sort' /tmp/baseline.before)
            after_set=$(jq -S --arg f "$f" '.results[$f] | map(.hashed_secret) | sort' .secrets.baseline)
            if [[ "$before_set" != "$after_set" ]]; then
              echo "::error::detect-secrets - new finding in $f vs baseline"
              diff <(echo "$before_set") <(echo "$after_set") || true
              exit 1
            fi
          done

  trivy:
    name: Trivy (secrets + misconfig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install trivy
        run: |
          set -euo pipefail
          curl -fsSL https://get.aquasec.com/install.sh \
            | sh -s -- -b /usr/local/bin v0.70.0 || \
          curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.70.0
          trivy --version | head -3

      - name: Trivy - filesystem (secrets + misconfig)
        run: |
          trivy fs --scanners secret,misconfig \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --skip-dirs .git \
            .
